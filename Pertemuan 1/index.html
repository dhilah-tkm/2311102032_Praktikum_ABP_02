<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ramadan Berkah</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Background bintang -->
    <div class="stars" id="stars"></div>

    <div class="page-wrapper py-4 py-md-5">
      <div class="container">
        <div class="text-center mb-4">
          <div class="mb-2">
            <span class="star-icon">✨</span>
            &nbsp;&nbsp;
            <span class="moon-icon">🌙</span>
            &nbsp;&nbsp;
            <span class="star-icon" style="animation-delay: 0.8s">✨</span>
          </div>
          <h1 class="ramadan-title mb-1">Ramadan Kareem</h1>
          <p
            class="mb-0"
            style="
              color: rgba(255, 248, 231, 0.65);
              font-size: 0.95rem;
              letter-spacing: 0.03em;
            "
          >
            Putar slot dan dapatkan THR Lebaran! ✨
          </p>
        </div>

        <div class="slot-card mx-auto p-3 p-md-4">
          <div class="slot-header text-center mb-3">SLOT RAMADAN</div>
          <div
            class="reels-frame d-flex justify-content-center mb-3"
            id="reelsFrame"
          >
            <div class="reel-box" id="reel0">
              <div class="reel-symbol" id="sym0">🕌</div>
              <div class="reel-label">Masjid</div>
            </div>
            <div class="reel-box" id="reel1">
              <div class="reel-symbol" id="sym1">🌙</div>
              <div class="reel-label">Bulan</div>
            </div>
            <div class="reel-box" id="reel2">
              <div class="reel-symbol" id="sym2">🎁</div>
              <div class="reel-label">Hadiah</div>
            </div>
          </div>
          <div class="text-center mb-3">
            <span class="badge-putaran" id="badgePutaran">Putaran ke-0</span>
          </div>
          <div class="text-center mb-3">
            <button
              class="btn btn-putar px-5"
              id="btnPutar"
              onclick="startSpin()"
            >
              &nbsp;PUTAR!
            </button>
          </div>

          <div class="hint-bar text-center">
            3x 🫘 = <strong>THR Rp 50.000!</strong>
          </div>
        </div>
      </div>
    </div>

    <!-- Jackpot -->
    <div
      class="modal fade modal-win"
      id="modalWin"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div
          class="modal-content text-center position-relative overflow-hidden"
          id="winModalContent"
        >
          <div
            id="confettiContainer"
            class="position-absolute w-100 h-100"
            style="top: 0; left: 0; pointer-events: none; z-index: 10"
          ></div>

          <div class="modal-header border-0 justify-content-center pt-4 pb-0">
            <span class="win-icon" style="font-size: 3.5rem">🎉</span>
          </div>
          <div class="modal-body px-4 pb-2">
            <h2
              class="fw-900 mb-1"
              style="
                font-family: &quot;Cinzel Decorative&quot;, serif;
                color: var(--gold);
                font-size: 1.8rem;
                font-weight: 900;
              "
            >
              SELAMAT!
            </h2>
            <p class="mb-3" style="font-weight: 600; font-size: 1rem">
              Anda Mendapatkan THR! 🏮
            </p>
            <div class="win-amount mb-3">Rp 50.000</div>
            <p style="color: rgba(255, 248, 231, 0.7); font-size: 0.85rem">
              🌸 Taqabbalallahu Minna Wa Minkum 🌸
            </p>
          </div>
          <div class="modal-footer border-0 justify-content-center gap-3 pb-4">
            <button
              class="btn btn-gold"
              data-bs-dismiss="modal"
              onclick="resetGame()"
            >
              Alhamdulillah! 🤲
            </button>
            <button
              class="btn btn-outline-gold"
              data-bs-dismiss="modal"
              onclick="resetGame()"
            >
              Putar Lagi
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Gagal -->
    <div
      class="modal fade modal-lose"
      id="modalLose"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center">
          <div class="modal-body px-4 pb-2">
            <h3 class="fw-bold mb-1" style="color: var(--gold)">
              Belum Beruntung!
            </h3>
            <p style="color: rgba(255, 248, 231, 0.7); font-size: 0.9rem">
              Jangan menyerah, coba lagi!<br />Rezeki tidak kemana 🤲
            </p>
          </div>
          <div class="modal-footer border-0 justify-content-center pb-4">
            <button class="btn btn-gold" data-bs-dismiss="modal">
              Coba Lagi!
            </button>
          </div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
