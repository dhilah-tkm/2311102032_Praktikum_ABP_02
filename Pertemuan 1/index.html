<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ramadan Slot</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="text-white min-vh-100 d-flex align-items-center bg-success">

    <div class="container">
      <div class="text-center mb-5">
        <h1 class="display-3 fw-bold text-warning">🌙 RAMADAN SLOT</h1>
        <p class="fs-5 text-light opacity-75">
          Putar dan menangkan THR Lebaran!
        </p>
      </div>

      <div class="card bg-success border border-4 border-warning shadow-lg mx-auto" style="max-width: 500px">
        <div class="card-body text-center p-4">
          <div class="d-flex justify-content-center gap-3 mb-4">
            <div
              id="reel0"
              class="bg-white rounded-3 border border-3 border-warning d-flex align-items-center justify-content-center"
              style="width: 100px; height: 120px"
            >
              <span id="sym0" class="display-4 text-dark">🕌</span>
            </div>
            <div
              id="reel1"
              class="bg-white rounded-3 border border-3 border-warning d-flex align-items-center justify-content-center"
              style="width: 100px; height: 120px"
            >
              <span id="sym1" class="display-4 text-dark">🌙</span>
            </div>
            <div
              id="reel2"
              class="bg-white rounded-3 border border-3 border-warning d-flex align-items-center justify-content-center"
              style="width: 100px; height: 120px"
            >
              <span id="sym2" class="display-4 text-dark">🎁</span>
            </div>
          </div>

          <div class="mb-4">
            <span
              id="badgePutaran"
              class="badge rounded-pill bg-warning text-dark px-3 py-2 fw-bold"
              >SIAP BERMAIN</span
            >
          </div>

          <div class="d-grid px-4">
            <button
              id="btnPutar"
              class="btn btn-warning btn-lg fw-black shadow py-3"
              onclick="startSpin()"
            >
              <strong>KLIK UNTUK PUTAR!</strong>
            </button>
          </div>
        </div>
      </div>

      <div class="fs-5 text-center mt-4">
        <small>3x 🫘 = Hadiah Rp 50.000</small>
      </div>
    </div>

    <div class="modal fade" id="modalWin" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-success border border-4 border-warning text-white">
          <div class="modal-body text-center py-5">
            <h1 class="mb-3">JACKPOT THR!</h1>
            <img
              src="assets/jackpot.jpg"
              alt="Jackpot"
              class="d-block mx-auto mb-3 img-fluid mh-100"
            />
            <p class="fs-5">Selamat! Kamu berhak mendapatkan:</p>
            <h3 class="bg-white text-success d-inline-block px-5 py-3 rounded-pill fw-bolder mt-2 border border-warning">
              Rp 50.000
            </h3>
            <div class="mt-5">
              <button
                class="btn btn-light btn-lg px-5 fw-bold"
                data-bs-dismiss="modal"
              >
                Alhamdulillah! 🤲
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="modalLose" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-secondary text-white border border-dark">
          <div class="modal-body text-center py-4">
            <h3 class="mb-3">Zonk!</h3>
            <img
              src="assets/zonk.jpg"
              alt="Belum Beruntung"
              class="d-block mx-auto mb-3 img-fluid mh-100"
            />
            <p>Belum beruntung, coba lagi ya. Rezeki nggak akan tertukar!</p>
            <button class="btn btn-dark w-100" data-bs-dismiss="modal">
              Coba Lagi
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
